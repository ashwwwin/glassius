name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Swift Build (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

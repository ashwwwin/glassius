name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Swift Build (macOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release
